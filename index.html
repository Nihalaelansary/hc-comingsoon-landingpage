<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soon!</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background:#000;
      color:#fff;
      min-height:100vh;
    }

    .hero{
      position:relative;
      width:100%;
      min-height:100vh;
      overflow:hidden;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }

    .hero img{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(
        to top,
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.2)
      );
    }

    .content{
      position:relative;
      z-index:2;
      width:100%;
      padding:40px 20px 60px;
      text-align:center;
    }

    .announcement{
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      padding:20px;
      border-radius:20px;
      max-width:600px;
      margin:auto;
      border:1px solid rgba(255,255,255,0.2);
    }

    .announcement p{
      font-size:1.4rem;
      line-height:1.8;
      font-weight:bold;
    }

    @media (max-width:768px){
      .announcement p{
        font-size:1.1rem;
      }

      .content{
        padding:20px 15px 40px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    
    <!-- Cover Image -->
    <img src="1080x1920-01-01.jpg.jpeg" alt="Cover Image">

    <div class="overlay"></div>

    <!-- Content -->
    <div class="content">
      <div class="announcement">
        <p>
          احتفظ بالمنتج لحين بدأ المسابقة
        </p>
      </div>
    </div>

  </section>

</body>
</html>
